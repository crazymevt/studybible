name: Flatpak Test Build

# Manual-only: builds the Flatpak and uploads it as a downloadable workflow
# artifact (NOT a release). Use this to test the Flatpak on a Linux machine
# without cutting a release. Trigger from the Actions tab or:
#   gh workflow run flatpak-test.yml
on:
  workflow_dispatch:

jobs:
  flatpak:
    name: Build Flatpak (artifact only)
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.4'

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev \
            flatpak flatpak-builder appstream desktop-file-utils
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Validate metadata
        run: |
          appstreamcli validate --no-net flatpak/io.github.crazymevt.StudyBible.metainfo.xml
          desktop-file-validate flatpak/io.github.crazymevt.StudyBible.desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux bundle
        run: flutter build linux --release

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --repo=flatpak-repo --force-clean flatpak-build-dir \
            flatpak/io.github.crazymevt.StudyBible.yml
          flatpak build-bundle flatpak-repo StudyBible-Linux.flatpak \
            io.github.crazymevt.StudyBible

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudyBible-Linux-flatpak
          path: StudyBible-Linux.flatpak
          if-no-files-found: error
