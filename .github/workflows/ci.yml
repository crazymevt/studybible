name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Allow other workflows (e.g. release.yml) to run this same quality gate so
  # there is a single source of truth for lint + analyze + tests.
  workflow_call:

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check domain layer purity
        run: bash tool/lint_domain.sh

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
