name: Build and Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-ubuntu:
    name: Build Android, Linux, Web
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — the release APK will be debug-signed."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          EOF

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Linux
        run: flutter build linux --release

      - name: Compress Linux Build
        run: tar -czf StudyBible-Linux.tar.gz -C build/linux/x64/release/bundle .

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk StudyBible-Android.apk

      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          make_latest: "true"
          files: |
            StudyBible-Android.apk
            StudyBible-Linux.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Compress macOS Build
        run: ditto -c -k --sequesterRsrc --keepParent "build/macos/Build/Products/Release/Study Bible.app" StudyBible-macOS.zip

      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          make_latest: "true"
          files: |
            StudyBible-macOS.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Compress Windows Build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath StudyBible-Windows.zip

      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          make_latest: "true"
          files: |
            StudyBible-Windows.zip

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev \
            flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux bundle
        run: flutter build linux --release

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --repo=flatpak-repo --force-clean flatpak-build-dir \
            flatpak/io.github.crazymevt.StudyBible.yml
          flatpak build-bundle flatpak-repo StudyBible-Linux.flatpak \
            io.github.crazymevt.StudyBible

      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          make_latest: "true"
          files: |
            StudyBible-Linux.flatpak
