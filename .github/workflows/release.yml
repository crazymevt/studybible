name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  build-ubuntu:
    name: Build Android, Linux, Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Linux
        run: flutter build linux --release

      - name: Build Web
        run: flutter build web --release

      - name: Compress Linux Build
        run: tar -czf StudyBible-Linux.tar.gz -C build/linux/x64/release/bundle .

      - name: Compress Web Build
        run: zip -r StudyBible-Web.zip build/web

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk StudyBible-Android.apk

      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            StudyBible-Android.apk
            StudyBible-Linux.tar.gz
            StudyBible-Web.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Compress macOS Build
        run: ditto -c -k --sequesterRsrc --keepParent "build/macos/Build/Products/Release/Study Bible.app" StudyBible-macOS.zip

      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            StudyBible-macOS.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Compress Windows Build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath StudyBible-Windows.zip

      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            StudyBible-Windows.zip
